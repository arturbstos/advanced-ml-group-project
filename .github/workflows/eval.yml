name: Gold-set evaluation

on:
  push:
    branches: [main]
    paths:
      - 'app/services/clause_analyzer.py'
      - 'app/services/ingestion.py'
      - 'db/**'
      - 'tests/evaluation/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            openai pdfplumber python-dotenv pydantic tenacity langdetect \
            presidio-analyzer presidio-anonymizer \
            google-cloud-firestore firebase-admin google-cloud-documentai \
            spacy==3.8.*
          python -m spacy download de_core_news_sm
          python -m spacy download en_core_web_sm

      - name: Write credentials
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
        run: echo "$FIREBASE_SA_JSON" > firebase-adminsdk.json

      - name: Run evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: firebase-adminsdk.json
        run: |
          python tests/evaluation/run_eval.py --no-history
